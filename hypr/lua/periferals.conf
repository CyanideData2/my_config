# ----------------------------------------------------- 
# Desktop Environment Options
# https://wiki.hyprland.org/Configuring/Variables/#input
# -----------------------------------------------------
#
monitor=eDP-1,preferred,0x0,1.2
exec-once = /home/julia/V/Workspace/my_config/hypr/scripts/automonitor_resolution.sh

# monitor=HDMI-A-1,1920x1080@120.00Hz,0x0,1.33
# monitor=eDP-1,1920x1080,-1200x150,1.6

exec-once = hyprctl setcursor breeze_cursors 24
input {
    kb_layout = es
    numlock_by_default = true
    follow_mouse = 2
    mouse_refocus = false
    
    # For United States
    # kb_layout = us
    # kb_variant = intl
    # kb_model = pc105
    # kb_options =

    touchpad {
        # for desktop
        disable_while_typing = true
        natural_scroll = true
        
        # for laptop
        # natural_scroll = yes
        # middle_button_emulation = true
        # clickfinger_behavior = false     
        scroll_factor = 1  # Touchpad scroll factor
    }
    tablet {
    }
    sensitivity = 0 # Pointer speed: -1.0 - 1.0, 0 means no modification.
}

gestures {
    # workspace_swipe = true
}
