# -----------------------------------------------------
# General window layout and colors
# name: "Window"
# -----------------------------------------------------
general {
  gaps_in = 5
  gaps_out = 10
    border_size = 2
    col.active_border = $primary
    # col.inactive_border = rgba(ffffffff)
    layout = dwindle
    resize_on_border = true
}
animations{
    enabled = false
}

decoration {
  rounding = 20
  rounding_power = 2

  blur {
    enabled = true
    size = 3
    passes = 2
    vibrancy = 0.1696
  }

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }
}

windowrule = match:class floating, float on
windowrule = match:class org.pulseaudio.pavucontrol, float on
windowrule = match:class prompt, float on
windowrule = match:class prompt, size 500 80
windowrule = match:fullscreen 1, border_color $secondary

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}
