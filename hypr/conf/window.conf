# -----------------------------------------------------
# General window layout and colors
# name: "Window"
# -----------------------------------------------------
general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2
    col.active_border = $primary
    # col.inactive_border = rgba(ffffffff)
    layout = dwindle
    resize_on_border = true
}
animations{
    enabled = false
}

decoration {
    rounding = 2

    blur:enabled = false #LAPTOP

    shadow:enabled = false #LAPTOP
}

windowrulev2 = float, class:floating
windowrulev2 = float, class:org.pulseaudio.pavucontrol
windowrulev2 = float, class:prompt
windowrulev2 = size 500 80, class:prompt
windowrulev2 = bordercolor $secondary,fullscreen:1
